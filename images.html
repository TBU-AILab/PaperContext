<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Gallery</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .topbar {
      text-align: center;
      margin-bottom: 20px;
    }

    .topbar a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 12px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-bottom: 10px;
      cursor: zoom-in;
    }

    .filename {
      font-size: 13px;
      color: #9ca3af;
      word-break: break-word;
      text-align: center;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: zoom-out;
    }

    #overlay img {
      max-width: 90%;
      max-height: 90%;
      transform-origin: center center;
      transition: transform 0.1s ease;
      cursor: default;
    }
  </style>
</head>
<body>
  <h1>Image Gallery</h1>

  <div class="topbar">
    <a href="index.html">← Back to hub</a>
  </div>

  <div class="gallery" id="gallery"></div>

  <div id="overlay">
    <img id="overlay-img" alt="Zoomed image">
  </div>

  <script>
    const imageFiles = [
      "fitness_all_subsets_gemini.png",
      "fitness_all_subsets_gpt.png",
      "fitness_all_subsets_opus.png",
      "gemini_alg_family.png",
      "gemini_boxplot.png",
      "gpt_alg_family.png",
      "gpt_boxplot.png",
      "m_family_by_llm_relative.png",
      "m_features_by_llm.png",
      "opus_alg_family.png",
      "opus_boxplot.png",
      "diagram.png",
      "EASE.png",
      "experiment_structure.png"
    ];

    const overlay = document.getElementById("overlay");
    const overlayImg = document.getElementById("overlay-img");
    const gallery = document.getElementById("gallery");

    let scale = 1;

    function openOverlay(src) {
      overlay.style.display = "flex";
      overlayImg.src = src;
      scale = 1;
      overlayImg.style.transform = "scale(1)";
    }

    overlay.onclick = () => {
      overlay.style.display = "none";
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        overlay.style.display = "none";
      }
    });

    overlay.addEventListener("wheel", (e) => {
      e.preventDefault();

      const zoomSpeed = 0.1;
      scale += e.deltaY < 0 ? zoomSpeed : -zoomSpeed;
      scale = Math.max(0.5, Math.min(scale, 5));

      overlayImg.style.transform = `scale(${scale})`;
    });

    overlayImg.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    imageFiles.forEach(file => {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = `images/${file}`;
      img.alt = file;
      img.loading = "lazy";
      img.onclick = () => openOverlay(img.src);

      const label = document.createElement("div");
      label.className = "filename";
      label.textContent = file;

      card.appendChild(img);
      card.appendChild(label);
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
