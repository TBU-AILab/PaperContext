<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Visualization Hub</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 280px);
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card:hover {
      border-color: #60a5fa;
      transform: translateY(-3px);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 13px;
      color: #9ca3af;
    }
    .topbar {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      text-align: center;
    }

    .topbar a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid #374151;
      padding: 6px 12px;
      border-radius: 8px;
      background: #111827;
      transition: all 0.2s ease;
    }

    .topbar a:hover {
      border-color: #60a5fa;
      background: #1f2937;
    }
    .repo-link {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>



  <div class="container">
    <h1>Visualization Hub</h1>

    <div class="repo-link">
      <a href="https://github.com/TBU-AILab/PaperContext" target="_blank">
        🔗 Project repository (PaperContext)
      </a>
    </div>

    <div class="grid">
      <div class="card" onclick="location.href='feature.html'">
        <div class="title">Feature Matrix</div>
        <div class="desc">
          Attributes × tasks matrix<br>
          Detailed feature comparison
        </div>
      </div>

      <div class="card" onclick="location.href='heatmap.html'">
        <div class="title">Iteration Heatmap</div>
        <div class="desc">
          Iteration × task visualization<br>
          Metaheuristic family overview
        </div>
      </div>

    <div class="card" onclick="location.href='images.html'">
      <div class="title">Image Gallery</div>
      <div class="desc">
        Static outputs<br>
        Generated visualizations
      </div>
    </div>
    </div>
  </div>
</body>
</html>
